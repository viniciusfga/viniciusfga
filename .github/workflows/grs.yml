name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *" # Executa todo dia às 03:00 UTC
  workflow_dispatch:     # Permite rodar manualmente para testar

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # Necessário para fazer push no repositório
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=radical
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p profile # Garante que a pasta existe
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
